# This rule is not used by the project zeroscale itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the zeroscale.zeroscale.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: zeroscale
    app.kubernetes.io/managed-by: kustomize
  name: scalegate-editor-role
rules:
- apiGroups:
  - zeroscale.zeroscale.dev
  resources:
  - scalegates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - zeroscale.zeroscale.dev
  resources:
  - scalegates/status
  verbs:
  - get
